<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiet san pham - UTH Mobile Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/home.css">
    <link rel="stylesheet" href="../css/product-detail.css">
</head>
<body>

    <div id="header-container"></div>

    <div class="container page-content">
        <div class="product-detail-card">
            <div class="gallery">
                <button id="prev-btn" class="slider-btn">❮</button>
                <img id="product-image" alt="San pham">
                <button id="next-btn" class="slider-btn">❯</button>
            </div>

            <div class="detail-info">
                <h1 id="product-name"></h1>
                <h2 id="product-price"></h2>
                
                <div class="promo-box">
                    <h4><i class="fa-solid fa-gift"></i> Khuyen mai</h4>
                    <p id="product-promotion"></p>
                </div>

                <p id="product-description"></p>

                <div class="detail-actions">
                    <button class="buy-btn" id="add-cart-btn"><i class="fa-solid fa-cart-plus"></i> Them vao gio</button>
                    <a href="../index.html"><button class="back-btn"><i class="fa-solid fa-arrow-left"></i> Quay lai</button></a>
                </div>
            </div>
        </div>

        <div class="specs-box">
            <h3>Thong so ky thuat</h3>
            <table id="product-specs"></table>
        </div>

        <h2 class="related-title">San pham lien quan</h2>
        <div id="related-products" class="product-grid"></div>
    </div>

    <footer class="footer">
        <h3>Mobile Shop</h3>
        <p>Website thuong mai dien tu mon Lap Trinh Web 2026</p>
    </footer>

    <script src="../js/config.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/product-detail.js"></script>
    <script>
        fetch('../components/header.html')
            .then(function(res) { return res.text(); })
            .then(function(data) {
                document.getElementById('header-container').innerHTML = data;
                if (typeof updateAuthUI === 'function') {
                    updateAuthUI();
                }
            });
        fetch('../components/footer.html')
            .then(function(res) { return res.text(); })
            .then(function(data) { 
            });
    </script>
</body>
</html>
