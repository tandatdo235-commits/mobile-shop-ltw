<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dang nhap</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
    <script src="../js/config.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/auth.js"></script>
</head>
<body>
    <div id="header-container"></div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h2>Dang nhap</h2>
            <p class="sub">Dang nhap de mua sam va quan ly don hang</p>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Dia chi email" required>
                </div>
                <div class="form-group">
                    <label>Mat khau</label>
                    <input type="password" id="password" placeholder="Mat khau" required>
                </div>
                <button type="submit" class="btn-submit">Dang nhap</button>
            </form>
            <div class="extra-links">
                Chua co tai khoan? <a href="register.html">Dang ky ngay</a>
            </div>
        </div>
    </div>

    <div id="footer-container"></div>

    <script>
        fetch('../components/header.html')
            .then(function(res) { return res.text(); })
            .then(function(data) { 
                document.getElementById('header-container').innerHTML = data;
                if (typeof updateAuthUI === 'function') {
                    updateAuthUI();
                }
            });
        fetch('../components/footer.html')
            .then(function(res) { return res.text(); })
            .then(function(data) { document.getElementById('footer-container').innerHTML = data; });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value.trim();
            var btn = this.querySelector('.btn-submit');
            btn.textContent = 'Dang dang nhap...';
            btn.disabled = true;
            await login(email, password);
            btn.textContent = 'Dang nhap';
            btn.disabled = false;
        });

        if (typeof isLoggedIn !== 'undefined' && isLoggedIn()) {
            window.location.href = 'profile.html';
        }
    </script>
</body>
</html>
