<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý sản phẩm</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/admin.css">
    <script src="../../js/config.js"></script>
    <script src="../../js/common.js"></script>
    <script src="../../js/auth.js"></script>
</head>
<body>

<div class="admin-layout">
    <aside class="sidebar">
        <h2>ADMIN</h2>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="products.html" class="active">Sản phẩm</a></li>
            <li><a href="orders.html">Đơn hàng</a></li>
        </ul>
    </aside>

    <main class="content">
        <h1>Quản lý sản phẩm</h1>
        <div class="table-container">
            <div class="table-header">
                <h2>Danh sách sản phẩm</h2>
                <button class="add-btn">Thêm sản phẩm</button>
            </div>

            <div class="toolbar">
                <input type="text" placeholder="Tìm kiếm sản phẩm...">
                <button>Tìm kiếm</button>
            </div>

            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Hình ảnh</th>
                        <th>Tên sản phẩm</th>
                        <th>Danh mục</th>
                        <th>Giá</th>
                        <th>Tồn kho</th>
                        <th>Sửa</th>
                        <th>Xóa</th>
                    </tr>
                </thead>
                <tbody id="products-table">
                    <tr>
                        <td>SP001</td>
                        <td>
                            <img src="../../assets/images/iphone.jpg" alt="iPhone" style="width:60px; height:60px; object-fit:cover; border-radius:8px;" onerror="this.src='../../assets/images/no-image.png'">
                        </td>
                        <td>iPhone 15 Pro Max</td>
                        <td>Điện thoại</td>
                        <td>29.990.000đ</td>
                        <td>25</td>
                        <td><button class="edit-btn">Sửa</button></td>
                        <td><button class="delete-btn">Xóa</button></td>
                    </tr>
                    <tr>
                        <td>SP002</td>
                        <td>
                            <img src="../../assets/images/macbook.jpg" alt="Macbook" style="width:60px; height:60px; object-fit:cover; border-radius:8px;" onerror="this.src='../../assets/images/no-image.png'">
                        </td>
                        <td>MacBook Air M4</td>
                        <td>Laptop</td>
                        <td>32.990.000đ</td>
                        <td>12</td>
                        <td><button class="edit-btn">Sửa</button></td>
                        <td><button class="delete-btn">Xóa</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<script src="../../js/admin.js"></script>
<script src="../../js/notification.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        if (isLoggedIn() && typeof initGlobalSocket === 'function') {
            initGlobalSocket();
        }
    });
</script>
</body>
</html>
