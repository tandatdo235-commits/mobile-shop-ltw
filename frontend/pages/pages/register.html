<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dang ky</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
    <script src="../js/config.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/auth.js"></script>
</head>
<body>
    <div id="header-container"></div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h2>Dang ky</h2>
            <p class="sub">Tao tai khoan de trai nghiem mua sam tot nhat</p>
            <form id="registerForm">
                <div class="form-group">
                    <label>Ho va ten</label>
                    <input type="text" id="fullName" placeholder="Ho va ten" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Dia chi email" required>
                </div>
                <div class="form-group">
                    <label>Mat khau</label>
                    <input type="password" id="password" placeholder="Mat khau (it nhat 6 ky tu)" required>
                </div>
                <div class="form-group">
                    <label>Xac nhan mat khau</label>
                    <input type="password" id="confirmPassword" placeholder="Nhap lai mat khau" required>
                </div>
                <div class="terms-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">Toi dong y voi cac Dieu khoan va Dieu kien</label>
                </div>
                <button type="submit" class="btn-submit">Dang ky</button>
            </form>
            <div class="extra-links">
                Da co tai khoan? <a href="login.html">Dang nhap</a>
            </div>
        </div>
    </div>

    <div id="footer-container"></div>

    <script>
        fetch('../components/header.html')
            .then(function(res) { return res.text(); })
            .then(function(data) { 
                document.getElementById('header-container').innerHTML = data;
                if (typeof updateAuthUI === 'function') {
                    updateAuthUI();
                }
            });
        fetch('../components/footer.html')
            .then(function(res) { return res.text(); })
            .then(function(data) { document.getElementById('footer-container').innerHTML = data; });

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var fullName = document.getElementById('fullName').value.trim();
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;
            var confirm = document.getElementById('confirmPassword').value;
            var terms = document.getElementById('terms').checked;

            if (!terms) {
                showToast('Vui long dong y voi dieu khoan', 'error');
                return;
            }
            if (password !== confirm) {
                showToast('Mat khau khong khop', 'error');
                return;
            }
            if (password.length < 6) {
                showToast('Mat khau toi thieu 6 ky tu', 'error');
                return;
            }

            var btn = this.querySelector('.btn-submit');
            btn.textContent = 'Dang dang ky...';
            btn.disabled = true;
            await register(fullName, email, password, 'user');
            btn.textContent = 'Dang ky';
            btn.disabled = false;
        });

        if (typeof isLoggedIn !== 'undefined' && isLoggedIn()) {
            window.location.href = 'profile.html';
        }
    </script>
</body>
</html>
