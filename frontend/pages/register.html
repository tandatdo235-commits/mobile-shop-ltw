<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <script src="js/config.js"></script>
    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
</head>
<body>

    <div id="header-container"></div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h2>Đăng ký</h2>
            <p class="sub">Tạo tài khoản để trải nghiệm mua sắm tốt nhất</p>
            <form id="registerForm">
                <div class="form-group">
                    <label>Họ và tên</label>
                    <input type="text" id="fullName" placeholder="Họ và tên" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Địa chỉ email" required>
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="password" placeholder="Mật khẩu (ít nhất 6 ký tự)" required>
                </div>
                <div class="form-group">
                    <label>Xác nhận mật khẩu</label>
                    <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu" required>
                </div>
                <div class="terms-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">Tôi đồng ý với Điều khoản và Điều kiện</label>
                </div>
                <button type="submit" class="btn-submit">Đăng ký</button>
            </form>
            <div class="extra-links">
                Đã có tài khoản? <a href="login.html">Đăng nhập</a>
            </div>
        </div>
    </div>

    <div id="footer-container"></div>

    <script>
        fetch('../components/header.html')
            .then(res => res.text())
            .then(data => document.getElementById('header-container').innerHTML = data);
        fetch('../components/footer.html')
            .then(res => res.text())
            .then(data => document.getElementById('footer-container').innerHTML = data);

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('terms').checked;

            if (!terms) {
                showToast('Vui lòng đồng ý với điều khoản', 'error');
                return;
            }
            if (password !== confirm) {
                showToast('Mật khẩu không khớp', 'error');
                return;
            }
            if (password.length < 6) {
                showToast('Mật khẩu tối thiểu 6 ký tự', 'error');
                return;
            }

            const btn = this.querySelector('.btn-submit');
            btn.textContent = 'Dang dang ky...';
            btn.disabled = true;
            await register(fullName, email, password, 'user');
            btn.textContent = 'Dang ky';
            btn.disabled = false;
        });

        if (isLoggedIn()) {
            window.location.href = 'profile.html';
        }
    </script>

</body>
</html>
