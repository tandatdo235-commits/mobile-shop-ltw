<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách sản phẩm</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/home.css">
</head>
<body>

    <header class="header">
        <div class="header-main">
            <div class="logo" onclick="window.location.href='../index.html'">
                <i class="fa-solid fa-cart-shopping logo-icon"></i>
                <div class="logo-text">
                    <span class="logo-brand">SHOP</span>
                    <span class="logo-sub">Mobile</span>
                </div>
            </div>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Bạn muốn mua gì?">
                <button id="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
            <div class="header-action">

    <a
        href="./cart.html"
        class="action-btn"
        id="cart-count">

        Giỏ hàng (0)
        <i class="fa-solid fa-cart-arrow-down"></i>

    </a>

    <a href="#" class="action-btn">

        Tài khoản
        <i class="fa-regular fa-circle-user"></i>

    </a>

</div>
        </div>
    </header>

    <div class="container page-content">
        <div class="page-header">
            <h1 id="page-title">Danh sách sản phẩm</h1>
            <a href="../index.html">
                <button class="btn-back-home"><i class="fa-solid fa-house"></i> Trang chủ</button>
            </a>
        </div>

        <div id="product-list" class="product-grid"></div>
        <div id="pagination"></div>
    </div>

    <footer class="footer">
        <h3>Mobile Shop</h3>
        <p>Website thương mại điện tử môn Lập Trình Web © 2026</p>
    </footer>

    <script src="../js/config.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/products.js"></script>
</body>
</html>
