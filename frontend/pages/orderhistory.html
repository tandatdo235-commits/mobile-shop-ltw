<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">

    <title>Lich su don hang</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/orderhistory.css">
    <script src="../js/config.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/orderhistory.js"></script>
</head>
<body>
    <div id="header-container"></div>

    <main class="container">
        <div class="breadcrumb">
            <a href="../index.html">Trang chu</a> / Lich su don hang
        </div>
        <h1 class="page-title">Lich su don hang</h1>
        <div id="order-list">
            <p style="color: #4b5563;">Dang tai...</p>
        </div>
    </main>

    <div id="footer-container"></div>

    <script>
        fetch('../components/header.html')
            .then(function(res) { return res.text(); })
            .then(function(data) {
                document.getElementById('header-container').innerHTML = data;
                if (typeof updateAuthUI === 'function') {
                    updateAuthUI();
                }
            });
        fetch('../components/footer.html')
            .then(function(res) { return res.text(); })
            .then(function(data) { document.getElementById('footer-container').innerHTML = data; });
    </script>
