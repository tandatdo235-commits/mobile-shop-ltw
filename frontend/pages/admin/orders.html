<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý đơn hàng</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/admin.css">
    <script src="../../js/config.js"></script>
    <script src="../../js/common.js"></script>
    <script src="../../js/auth.js"></script>
</head>
<body>

<div class="admin-layout">
    <aside class="sidebar">
        <h2>ADMIN</h2>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="products.html">Sản phẩm</a></li>
            <li><a href="orders.html" class="active">Đơn hàng</a></li>
        </ul>
    </aside>

    <main class="content">
        <h1>Quản lý đơn hàng</h1>
        <div class="table-container">
            <div class="table-header">
                <h2>Danh sách đơn hàng</h2>
            </div>

            <div class="toolbar">
                <input type="text" id="searchOrder" placeholder="Tìm theo mã đơn hoặc tên khách hàng...">
                <select id="statusFilter">
                    <option value="">Tất cả trạng thái</option>
                    <option value="pending">Chờ xử lý</option>
                    <option value="success">Đã giao</option>
                    <option value="cancel">Đã hủy</option>
                </select>
                <button>Tìm kiếm</button>
            </div>

            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Mã đơn</th>
                        <th>Khách hàng</th>
                        <th>SĐT</th>
                        <th>Tổng tiền</th>
                        <th>Thanh toán</th>
                        <th>Trạng thái</th>
                        <th>Chi tiết</th>
                    </tr>
                </thead>
                <tbody id="orders-table">
                    <tr>
                        <td>DH001</td>
                        <td>Nguyễn Hoàng Tuấn</td>
                        <td>0901234567</td>
                        <td>25.000.000đ</td>
                        <td>COD</td>
                        <td><span class="status pending">Chờ xử lý</span></td>
                        <td><button class="detail-btn">Xem</button></td>
                    </tr>
                    <tr>
                        <td>DH002</td>
                        <td>Nguyễn Văn A</td>
                        <td>0987654321</td>
                        <td>15.500.000đ</td>
                        <td>Momo</td>
                        <td><span class="status success">Đã giao</span></td>
                        <td><button class="detail-btn">Xem</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<script src="../../js/admin.js"></script>
<script src="../../js/notification.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        if (isLoggedIn() && typeof initGlobalSocket === 'function') {
            initGlobalSocket();
        }
    });
</script>
</body>
</html>
