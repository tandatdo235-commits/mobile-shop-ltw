<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/common.js"></script>
    <script src="../assets/js/auth.js"></script>
</head>
<body>

    <div id="header-container"></div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h2>Đăng nhập</h2>
            <p class="sub">Đăng nhập để mua sắm và quản lý đơn hàng</p>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Địa chỉ email" required>
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="password" placeholder="Mật khẩu" required>
                </div>
                <button type="submit" class="btn-submit">Đăng nhập</button>
            </form>
            <div class="extra-links">
                Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
            </div>
        </div>
    </div>

    <div id="footer-container"></div>

    <script>
        fetch('../components/header.html')
            .then(res => res.text())
            .then(data => document.getElementById('header-container').innerHTML = data);
        fetch('../components/footer.html')
            .then(res => res.text())
            .then(data => document.getElementById('footer-container').innerHTML = data);

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const btn = this.querySelector('.btn-submit');
            btn.textContent = 'Dang dang nhap...';
            btn.disabled = true;
            await login(email, password);
            btn.textContent = 'Dang nhap';
            btn.disabled = false;
        });

        if (isLoggedIn()) {
            window.location.href = 'profile.html';
        }
    </script>

</body>
</html>
